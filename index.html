<h1>Not So Simple Salads</h1>
<p>Not So Simple Salads is a culinary lifestyle brand that treats salad-making as high-fashion horticulture. It provides a diverse collection of curated recipes categorized into 'Meal' and 'Lighter' salads, focusing on complex textures and luxury ingredients for individuals who demand more from their vegetables. Redefining the agricultural narrative through the lens of luxury, texture, and high-fashion horticulture.</p>
<h2>All Recipes</h2>
<ul>
  
    <li>
      <h3>Cauli-fornia Dreamin'</h3>
      <p>This was the salad that started it all — the one I fell for at Google and immediately needed to reverse-engineer. All the textures, that citrus dressing, but the crispy capers are what put it completely over the top.</p>
      <p>Manifesto: Salad is a canvas; you are the tortured artist.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Roasted cauliflower (~ 1 large head)</li><li>Castelvetrano olives (~ 1/2 cup, pitted)</li><li>Parmesan cheese (~ 1/3 cup, shaved)</li><li>Fennel (~ 1 bulb, shaved)</li><li>Arugula (~ 3 big handfuls)</li><li>Quinoa (~ 1 cup, cooked)</li><li>Crispy capers (~ 3 Tbsp)</li><li>Grilled chicken (~ 2 breasts, sliced)</li>
      </ul>
      <h4>Dressing: Citrus Vinaigrette</h4>
      <ul>
        <li>¾ cup orange juice</li><li>3 Tbsp olive oil</li><li>3 Tbsp lemon juice (1 lemon)</li><li>1½ Tbsp lime juice (1 lime)</li><li>1 tsp honey</li><li>1 tsp red wine vinegar</li><li>½ tsp kosher salt</li><li>½ tsp chili pepper flakes</li><li>Pinch ground white pepper</li><li>1 clove garlic, grated</li>
      </ul>
    </li>
  
    <li>
      <h3>Noodle Me This</h3>
      <p>I love Korean food, and a salad with kimchi in it was just such a fun punch-up for a hearty lunch. The kimchi brings heat, funk, and acidity all at once. Cold noodles, bold dressing, zero apologies.</p>
      <p>Manifesto: Texture is the difference between a meal and a chore.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Soba noodles (~ 6 oz, cooked cold)</li><li>Cabbage (~ 2 cups, shredded)</li><li>Spinach (~ 2 massive handfuls)</li><li>Cucumber (~ 1 whole, julienned)</li><li>Carrots (~ 2 medium, shredded)</li><li>Kimchi (~ 3/4 cup, rough chopped)</li>
      </ul>
      <h4>Dressing: Ginger Soy Miso</h4>
      <ul>
        <li>1½ Tbsp miso paste</li><li>2 Tbsp rice vinegar</li><li>1¼ Tbsp honey</li><li>1 Tbsp fresh ginger, grated</li><li>1 Tbsp sesame oil</li><li>1½ tsp lime juice</li><li>1 tsp roasted sesame seeds</li><li>1 tsp black sesame seeds</li><li>1 tsp Korean chili flakes</li>
      </ul>
    </li>
  
    <li>
      <h3>Banh Mi Over</h3>
      <p>If I'm not eating sushi or Mexican food, I'm eating Vietnamese food. We make fresh spring rolls constantly, but when I'm short on time, this is the solution. It's the flavor profile of a banh mi but in a bowl. Pro-tip: don't skip the fresh mint.</p>
      <p>Manifesto: Eat vegetables like you're plotting revenge.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Rice vermicelli noodles (~ 4 oz, cooked)</li><li>Shredded carrots (~ 1/2 cup, pickled)</li><li>Daikon radish (~ 1/2 cup, pickled)</li><li>Cucumber (~ 1/2, sliced thin)</li><li>Jalapeño (~ 1, thinly sliced)</li><li>Cilantro & Mint (~ 1 very large handful each)</li><li>Crispy tofu or chicken (~ 1 cup)</li>
      </ul>
      <h4>Dressing: Nuoc Cham Style</h4>
      <ul>
        <li>3 Tbsp fish sauce</li><li>3 Tbsp lime juice</li><li>2 Tbsp water</li><li>1½ Tbsp sugar</li><li>1 clove garlic, minced</li><li>1 Thai bird's eye chili, minced</li>
      </ul>
    </li>
  
    <li>
      <h3>Keep Cobb & Carry On</h3>
      <p>The classic, but done exactly how I want it. The key here is not skimping on the sharp cheddar and making sure the avocado is perfectly ripe. The dressing is creamy but has enough acid to cut through all the richness.</p>
      <p>Manifesto: Dress your greens better than you dress yourself.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Romaine lettuce (~ 2 heads, chopped)</li><li>Hard-boiled eggs (~ 3, halved)</li><li>Avocado (~ 1 large, diced)</li><li>Cherry tomatoes (~ 1 cup, halved)</li><li>Sharp cheddar (~ 1/2 cup, cubed)</li><li>Thick-cut bacon (~ 4 slices, crumbled)</li><li>Grilled chicken (~ 1 cup, chopped)</li>
      </ul>
      <h4>Dressing: Tangy Buttermilk Ranch</h4>
      <ul>
        <li>¼ cup buttermilk</li><li>¼ cup mayonnaise</li><li>2 Tbsp sour cream</li><li>1 Tbsp apple cider vinegar</li><li>1 Tbsp fresh chives, minced</li><li>½ tsp dill weed</li><li>½ tsp garlic powder</li><li>¼ tsp onion powder</li><li>To taste salt and black pepper</li>
      </ul>
    </li>
  
    <li>
      <h3>Thaid & True</h3>
      <p>Peanut dressing makes everything better. I could drink this dressing. The cabbage base means it holds up well in the fridge if you want to meal prep it. It's crunchy, savory, sweet, and aggressively good.</p>
      <p>Manifesto: A naked leaf is an unfulfilled promise.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Purple cabbage (~ 3 cups, shredded)</li><li>Green cabbage (~ 3 cups, shredded)</li><li>Carrots (~ 1 cup, matchsticks)</li><li>Red bell pepper (~ 1, thinly sliced)</li><li>Edamame (~ 1/2 cup, shelled)</li><li>Crushed peanuts (~ 1/3 cup, roasted)</li><li>Cilantro (~ 1 handful)</li>
      </ul>
      <h4>Dressing: Spicy Peanut</h4>
      <ul>
        <li>3 Tbsp creamy peanut butter</li><li>2 Tbsp soy sauce</li><li>1 Tbsp rice vinegar</li><li>1 Tbsp maple syrup</li><li>1 Tbsp sesame oil</li><li>1 tsp sriracha</li><li>1 clove garlic, grated</li><li>1 tsp fresh ginger, grated</li><li>1-2 Tbsp warm water (to thin)</li>
      </ul>
    </li>
  
    <li>
      <h3>Niçoise to Meet You</h3>
      <p>I always thought of Niçoise as a stuffy restaurant salad until I made it at home. Warm fingerling potatoes and perfectly blanch green beans change the entire game. And yes, you absolutely need the olives.</p>
      <p>Manifesto: Your fork is a weapon. Choose your ingredients wisely.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Mixed greens (~ 4 cups)</li><li>Fingerling potatoes (~ 8, boiled & halved)</li><li>Haricots verts (green beans) (~ 1 cup, blanched)</li><li>Cherry tomatoes (~ 1/2 cup, halved)</li><li>Niçoise olives (~ 1/3 cup)</li><li>Soft-boiled egg (~ 2)</li><li>High-quality tuna (~ 1 can, olive oil packed)</li>
      </ul>
      <h4>Dressing: Lemon Dijon</h4>
      <ul>
        <li>3 Tbsp extra virgin olive oil</li><li>1½ Tbsp lemon juice</li><li>1 tsp Dijon mustard</li><li>1 small shallot, minced</li><li>½ tsp herbes de Provence</li><li>To taste salt and pepper</li>
      </ul>
    </li>
  
    <li>
      <h3>Greek Expectations</h3>
      <p>A traditional Greek salad doesn't actually have lettuce, but I like a little base green. This is about huge chunks of cucumber, ripe tomatoes, and thick slabs of feta. The oregano heavy dressing is non-negotiable.</p>
      <p>Manifesto: Boring salads are a moral failing.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Romaine or crisp lettuce (~ 1 head, roughly chopped)</li><li>English cucumber (~ 1, large chunks)</li><li>Vine-ripe tomatoes (~ 3, large wedges)</li><li>Red onion (~ 1/4, very thinly sliced)</li><li>Kalamata olives (~ 1/2 cup, whole)</li><li>Feta cheese (~ 1 thick slab or 3/4 cup crumbled)</li>
      </ul>
      <h4>Dressing: Oregano Vinaigrette</h4>
      <ul>
        <li>¼ cup good Greek olive oil</li><li>2 Tbsp red wine vinegar</li><li>1 tsp dried oregano (rubbed between fingers)</li><li>1 clove garlic, smashed (to infuse, then remove)</li><li>½ tsp Dijon mustard</li><li>½ tsp kosher salt</li><li>¼ tsp black pepper</li>
      </ul>
    </li>
  
    <li>
      <h3>Romaine Calm (It's Just Caesar)</h3>
      <p>Everyone needs a perfect Caesar. The secret is to go heavy on the black pepper and definitely include the anchovy. Don't be scared of it; it provides the umami background that makes a true Caesar sing.</p>
      <p>Manifesto: This isn't diet food. This is an editorial spread.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Romaine hearts (~ 3 hearts, crisp, torn)</li><li>Parmigiano-Reggiano (~ 1 cup, roughly shaved)</li><li>Sourdough croutons (~ 2 cups, heavily toasted)</li><li>Black pepper (~ Massive amount, fresh cracked)</li>
      </ul>
      <h4>Dressing: Classic Caesar</h4>
      <ul>
        <li>2 egg yolks</li><li>2 anchovy fillets, mashed to paste</li><li>1 clove garlic, finely grated</li><li>1 Tbsp lemon juice</li><li>1 tsp Dijon mustard</li><li>⅓ cup neutral oil</li><li>2 Tbsp olive oil</li><li>¼ cup grated parmesan</li>
      </ul>
    </li>
  
    <li>
      <h3>Winner Winner Wonton</h3>
      <p>The crunchy wonton strips are the star, obviously. But the mandarin oranges provide little bursts of sweetness against the savory sesame dressing. It hits every craving node in your brain.</p>
      <p>Manifesto: If a salad doesn't crunch, it's just a sad smoothie.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Napa cabbage (~ 4 cups, shredded)</li><li>Romaine lettuce (~ 2 cups, shredded)</li><li>Shredded chicken (~ 2 cups (rotisserie is fine))</li><li>Mandarin oranges (~ 1 small can, drained)</li><li>Green onions (~ 3, sliced)</li><li>Sliced almonds (~ 1/4 cup, toasted)</li><li>Crispy wonton strips (~ 1 massive handful)</li>
      </ul>
      <h4>Dressing: Sesame Ginger</h4>
      <ul>
        <li>3 Tbsp rice vinegar</li><li>2 Tbsp soy sauce</li><li>1 Tbsp sesame oil</li><li>1 Tbsp honey</li><li>1 Tbsp neutral oil</li><li>1 tsp fresh ginger, minced</li><li>1 clove garlic, minced</li>
      </ul>
    </li>
  
    <li>
      <h3>Thai Me a River</h3>
      <p>A variation on my peanut salad, but centered around grilled flank steak. The steak needs to be rare, and the dressing needs to be incredibly lime-forward. When the steak juices mix with the dressing... incredible.</p>
      <p>Manifesto: Leave the sad desk salads in the 2010s.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Mixed greens or watercress (~ 3 cups)</li><li>Grilled flank steak (~ 1/2 lb, thinly sliced against grain)</li><li>Cherry tomatoes (~ 1 cup, halved)</li><li>Cucumber (~ 1/2, sliced in half moons)</li><li>Red onion (~ 1/4, extremely thin slices)</li><li>Mint & Cilantro (~ generous handfuls)</li><li>Roasted peanuts (~ 1/4 cup, crushed)</li>
      </ul>
      <h4>Dressing: Spicy Lime Beef Dressing</h4>
      <ul>
        <li>¼ cup lime juice (fresh only)</li><li>2 Tbsp fish sauce</li><li>1 Tbsp palm sugar or brown sugar</li><li>1-2 Thai bird's eye chilies, thinly sliced</li><li>1 clove garlic, grated</li><li>1 tsp lemongrass paste (optional)</li>
      </ul>
    </li>
  
    <li>
      <h3>The Salmon Situation</h3>
      <p>A beautifully pan-seared salmon fillet over a bed of lemony, garlicky kale. Massaging the kale is not optional—it breaks down the tough fibers and makes it actually enjoyable to eat raw.</p>
      <p>Manifesto: More acid. More salt. More everything.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Lacinato kale (dinosaur kale) (~ 1 large bunch, stems removed, chopped)</li><li>Salmon fillets (~ 2 (6oz each), pan-seared)</li><li>Avocado (~ 1, sliced)</li><li>Pomegranate seeds (~ 1/4 cup (for tart pops))</li><li>Pumpkin seeds (pepitas) (~ 3 Tbsp, toasted)</li><li>Goat cheese (~ 1/4 cup, crumbled)</li>
      </ul>
      <h4>Dressing: Lemon Garlic Massage</h4>
      <ul>
        <li>3 Tbsp olive oil</li><li>2 Tbsp lemon juice</li><li>1 clove garlic, smashed (to rub into kale)</li><li>Pinch sea salt (use to massage)</li><li>1 tsp honey</li>
      </ul>
    </li>
  
    <li>
      <h3>Pack'n Pasta</h3>
      <p>Is pasta salad a salad? I vote yes. This is the ultimate picnic or BBQ side. It's heavily Italian-American inspired: salami, provolone, pepperoncini. It gets better the longer it sits in the fridge.</p>
      <p>Manifesto: Croutons are pedestrian. Give me frizzled shallots or give me death.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Fusilli or Rotini pasta (~ 8 oz, cooked al dente)</li><li>Genoa salami (~ 4 oz, chopped)</li><li>Provolone cheese (~ 4 oz, cubed)</li><li>Cherry tomatoes (~ 1 cup, halved)</li><li>Red bell pepper (~ 1, diced)</li><li>Black olives (~ 1/2 cup, sliced)</li><li>Pepperoncini (~ 1/4 cup, sliced)</li><li>Fresh parsley (~ 2 Tbsp, chopped)</li>
      </ul>
      <h4>Dressing: Italian Deli Vinaigrette</h4>
      <ul>
        <li>⅓ cup extra virgin olive oil</li><li>3 Tbsp red wine vinegar</li><li>1 Tbsp pepperoncini juice</li><li>1 tsp dried Italian seasoning</li><li>1 clove garlic, minced</li><li>1 Tbsp grated parmesan</li><li>To taste salt and pepper</li>
      </ul>
    </li>
  
    <li>
      <h3>Bacon Me Crazy</h3>
      <p>The wedge salad's cooler, dismantled cousin. I prefer butter lettuce over iceberg here for a softer texture that still holds the heavy blue cheese dressing beautifully. Crispy bacon is the star.</p>
      <p>Manifesto: Lettuce is merely a vehicle for aggressive flavor.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Butter lettuce (Bibb) (~ 1 large head, leaves separated)</li><li>Thick-cut bacon (~ 4 slices, cooked until shattering)</li><li>Cherry tomatoes (~ 1 cup, quartered)</li><li>Red onion (~ 1/4, shaved paper-thin)</li><li>Blue cheese (~ 1/3 cup, large crumbles)</li><li>Fresh chives (~ Snapped over top)</li>
      </ul>
      <h4>Dressing: Chunky Blue Cheese</h4>
      <ul>
        <li>¼ cup sour cream</li><li>2 Tbsp mayonnaise</li><li>2 Tbsp buttermilk (or milk to thin)</li><li>¼ cup high-quality blue cheese crumbles</li><li>1 tsp white wine vinegar</li><li>¼ tsp garlic powder</li><li>To taste lots of black pepper</li>
      </ul>
    </li>
  
    <li>
      <h3>Salad Days</h3>
      <p>This is the 'I just want a simple house salad' option, but elevated. It's green on green with a bright, bracingly tart vinaigrette. It pairs with literally everything.</p>
      <p>Manifesto: A good salad should make you sweat a little.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Mixed spring greens (~ 4 huge handfuls)</li><li>Cucumber (~ 1/2, shaved into ribbons)</li><li>Green apple (~ 1/2, thinly sliced)</li><li>Celery (~ 2 stalks, sliced diagonally)</li><li>Toasted walnuts (~ 1/4 cup, crushed)</li>
      </ul>
      <h4>Dressing: Sharp Lemon Basil</h4>
      <ul>
        <li>3 Tbsp olive oil</li><li>2 Tbsp lemon juice</li><li>1 Tbsp fresh basil, finely minced</li><li>1 tsp Dijon mustard</li><li>½ tsp honey</li><li>Pinch salt and pepper</li>
      </ul>
    </li>
  
    <li>
      <h3>The Caprese Edit</h3>
      <p>You cannot mess with a Caprese, but you can insist on only making it in August when tomatoes actually taste like tomatoes. Don't use bad tomatoes. Don't do it.</p>
      <p>Manifesto: Respect the crunch. Worship the acid.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Heirloom tomatoes (~ 3 large, thick slices)</li><li>Fresh mozzarella (~ 1 large ball, sliced thick)</li><li>Fresh basil leaves (~ 1 massive handful, torn)</li><li>Flaky sea salt (~ Maldon, essential)</li><li>Fresh ground pepper (~ Generous cranks)</li>
      </ul>
      <h4>Dressing: Pure Simplicity</h4>
      <ul>
        <li>Generous best quality olive oil you own</li><li>Drizzle thick balsamic reduction (optional)</li>
      </ul>
    </li>
  
    <li>
      <h3>For the Love of Couscous</h3>
      <p>I used to forget that couscous could anchor a salad. This salad is a tribute to a dinner party. The watermelon radish is here for flavor and also because it's beautiful.</p>
      <p>Manifesto: If it doesn't stain your shirt, it's not dressed enough.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Tricolor pearl couscous (~ 1 cup, cooked)</li><li>Watermelon radish (~ 1, shaved on mandolin)</li><li>Cherry tomatoes (~ 1 cup, quartered)</li><li>Cucumber (~ 1/2, diced)</li><li>Fresh dill and mint (~ 3 Tbsp each, chopped)</li><li>Feta (~ 1/2 cup, crumbled)</li><li>Kalamata olives (~ 1/3 cup, halved)</li><li>Arugula (~ 2 handfuls)</li>
      </ul>
      <h4>Dressing: Shallot Fennel</h4>
      <ul>
        <li>4 Tbsp olive oil</li><li>2 Tbsp fresh lemon juice</li><li>1 tsp maple syrup</li><li>1 tsp Dijon mustard</li><li>1 clove garlic, grated</li><li>1 shallot, very finely minced</li><li>2 Tbsp fennel fronds, chopped</li>
      </ul>
    </li>
  
    <li>
      <h3>Water, Fire...and Feta!</h3>
      <p>Summer. California. Flavors that contrast in the best way possible. The Korean chili flakes turn this from a sweet fruit salad into something with actual heat.</p>
      <p>Manifesto: We don't do limp lettuce here. We do high-fashion horticulture.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Watermelon (~ 3 cups, cubed cold)</li><li>Mint (~ 1 huge handful, torn)</li><li>Feta block (~ 4 oz, cut into cubes)</li><li>Red onion (~ 1/4, sliced paper thin)</li><li>Cucumber (~ 1, peeled & chunks)</li>
      </ul>
      <h4>Dressing: Lime & Chili</h4>
      <ul>
        <li>¼ cup extra-virgin olive oil</li><li>2 limes, heavily juiced</li><li>Pinch kosher salt</li><li>To taste Korean gochugaru flakes</li>
      </ul>
    </li>
  
    <li>
      <h3>Zest Coast Salad</h3>
      <p>This is the newest one I'm playing with. The days are warm and I need more salads that scream 'fun light party in my mouth.' Tajín on fruit is one of those things that once you start, you cannot stop.</p>
      <p>Manifesto: Vegetables with an attitude problem.</p>
      <h4>Salad Ingredients:</h4>
      <ul>
        <li>Watermelon (~ 2 cups, cubed)</li><li>Cucumber (~ 1, large diced)</li><li>Pineapple (~ 1 cup, cubed)</li><li>Mango (~ 1 large, cubed)</li><li>Fresh cilantro (~ 1/4 cup, rough chop)</li><li>Cotija cheese (~ 1/2 cup, crumbled)</li>
      </ul>
      <h4>Dressing: Citrus Tajín</h4>
      <ul>
        <li>1 lemon, juiced</li><li>1 lime, juiced</li><li>1 lime, zest of</li><li>2 Tbsp honey</li><li>1 tsp Tajín (more to garnish)</li>
      </ul>
    </li>
  
</ul>
